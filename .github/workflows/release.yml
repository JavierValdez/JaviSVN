name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS
            os: macos-latest
            args: --mac dmg zip
            allow_system_svn: ''
          - name: Windows
            os: windows-latest
            args: --win nsis --x64
            allow_system_svn: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Subversion on macOS
        if: runner.os == 'macOS'
        run: brew install subversion

      - name: Install Subversion on Windows
        if: runner.os == 'Windows'
        run: choco install sliksvn -y --no-progress

      - name: Install dependencies
        run: npm ci

      - name: Build and publish
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JAVISVN_ALLOW_SYSTEM_SVN_FOR_BUNDLE: ${{ matrix.platform.allow_system_svn }}
        run: |
          if [ -n "${{ secrets.CSC_LINK }}" ]; then
            export CSC_LINK='${{ secrets.CSC_LINK }}'
          fi
          if [ -n "${{ secrets.CSC_KEY_PASSWORD }}" ]; then
            export CSC_KEY_PASSWORD='${{ secrets.CSC_KEY_PASSWORD }}'
          fi
          if [ -n "${{ secrets.APPLE_ID }}" ]; then
            export APPLE_ID='${{ secrets.APPLE_ID }}'
          fi
          if [ -n "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" ]; then
            export APPLE_APP_SPECIFIC_PASSWORD='${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}'
          fi
          if [ -n "${{ secrets.APPLE_TEAM_ID }}" ]; then
            export APPLE_TEAM_ID='${{ secrets.APPLE_TEAM_ID }}'
          fi

          npm run release -- ${{ matrix.platform.args }}
